<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI + 사주 퓨전 운세 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- ssaju 라이브러리 브라우저 버전 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/ssaju@latest/dist/index.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; }
        .markdown-content h1 { font-size: 1.5rem; font-weight: bold; margin: 1rem 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
        .markdown-content h2 { font-size: 1.25rem; font-weight: bold; margin: 0.8rem 0; }
        .markdown-content p { margin-bottom: 1rem; line-height: 1.6; }
        .markdown-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .loading-spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #4f46e5; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-indigo-700 mb-2">✨ MBTI + 사주 퓨전 운세 2026</h1>
            <p class="text-gray-600">당신의 MBTI와 전통 사주를 결합하여 2026년 병오년 운세를 분석해 드립니다.</p>
        </header>

        <!-- API 키 설정 섹션 -->
        <section id="apiSection" class="mb-8 bg-indigo-50 p-4 rounded-lg border border-indigo-100">
            <h3 class="text-sm font-semibold text-indigo-800 mb-2">🔑 API 설정 (OpenRouter)</h3>
            <div class="flex gap-2">
                <input type="password" id="apiKey" placeholder="sk-or-v1-..." class="flex-grow p-2 text-sm border rounded-md">
                <button id="saveKeyBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-md text-sm font-bold hover:bg-indigo-700">저장</button>
            </div>
            <p class="text-xs text-indigo-600 mt-2">* API 키는 브라우저(localStorage)에만 안전하게 저장됩니다. GitHub에 업로드되지 않습니다.</p>
        </section>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- 입력 폼 -->
            <section class="bg-white p-6 rounded-xl shadow-md">
                <h2 class="text-xl font-semibold mb-4 border-b pb-2">사용자 정보 입력</h2>
                <form id="sajuForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">이름</label>
                        <input type="text" id="name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">성별</label>
                            <select id="gender" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                                <option value="male">남성</option>
                                <option value="female">여성</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">MBTI</label>
                            <select id="mbti" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                                <option value="INTJ">INTJ</option><option value="INTP">INTP</option><option value="ENTJ">ENTJ</option><option value="ENTP">ENTP</option>
                                <option value="INFJ">INFJ</option><option value="INFP">INFP</option><option value="ENFJ">ENFJ</option><option value="ENFP">ENFP</option>
                                <option value="ISTJ">ISTJ</option><option value="ISFJ">ISFJ</option><option value="ESTJ">ESTJ</option><option value="ESFJ">ESFJ</option>
                                <option value="ISTP">ISTP</option><option value="ISFP">ISFP</option><option value="ESTP">ESTP</option><option value="ESFP">ESFP</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">생년월일</label>
                        <input type="date" id="birthDate" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">태어난 시간</label>
                        <input type="time" id="birthTime" value="00:00" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                    </div>
                    <div class="flex items-center space-x-4">
                        <label class="flex items-center">
                            <input type="checkbox" id="isLunar" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                            <span class="ml-2 text-sm text-gray-700">음력 여부</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="isLeap" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                            <span class="ml-2 text-sm text-gray-700">윤달 여부</span>
                        </label>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-md hover:bg-indigo-700 transition duration-200">운세 분석하기</button>
                </form>
            </section>

            <!-- 결과 출력 -->
            <section class="bg-white p-6 rounded-xl shadow-md min-h-[400px] flex flex-col">
                <h2 class="text-xl font-semibold mb-4 border-b pb-2">분석 결과</h2>
                <div id="resultContent" class="flex-grow flex flex-col justify-center items-center text-gray-500">
                    <p id="placeholderText">정보를 입력하고 버튼을 눌러주세요.</p>
                    <div id="loader" class="hidden flex flex-col items-center">
                        <div class="loading-spinner mb-4"></div>
                        <p id="loadingText">사주를 분석하고 있습니다...</p>
                    </div>
                </div>
                <div id="fortuneDisplay" class="hidden markdown-content overflow-y-auto max-h-[600px] text-gray-800"></div>
                <button id="saveBtn" class="hidden mt-4 w-full bg-emerald-600 text-white font-bold py-2 px-4 rounded-md hover:bg-emerald-700 transition duration-200">브라우저에 저장</button>
            </section>
        </main>

        <!-- 저장된 프로필 목록 -->
        <section class="mt-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">최근 저장된 프로필 (브라우저 로컬)</h2>
            <div id="profileList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- 프로필 카드들이 여기에 추가됨 -->
            </div>
        </section>
    </div>

    <script>
        let currentSajuData = null;
        let currentFortune = null;

        const form = document.getElementById('sajuForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultContent = document.getElementById('resultContent');
        const fortuneDisplay = document.getElementById('fortuneDisplay');
        const loader = document.getElementById('loader');
        const placeholderText = document.getElementById('placeholderText');
        const loadingText = document.getElementById('loadingText');
        const saveBtn = document.getElementById('saveBtn');
        const profileList = document.getElementById('profileList');
        const apiKeyInput = document.getElementById('apiKey');
        const saveKeyBtn = document.getElementById('saveKeyBtn');

        // API 키 불러오기
        apiKeyInput.value = localStorage.getItem('openrouter_api_key') || '';

        saveKeyBtn.onclick = () => {
            localStorage.setItem('openrouter_api_key', apiKeyInput.value);
            alert('API 키가 저장되었습니다.');
        };

        // 로컬 프로필 불러오기
        function loadProfiles() {
            const profiles = JSON.parse(localStorage.getItem('fortune_profiles') || '[]');
            profileList.innerHTML = '';
            profiles.reverse().forEach((p, idx) => {
                const card = document.createElement('div');
                card.className = 'bg-white p-4 rounded-lg shadow border border-gray-100 cursor-pointer hover:border-indigo-300 transition';
                card.innerHTML = `
                    <div class="font-bold text-lg text-indigo-700">${p.name} (${p.mbti})</div>
                    <div class="text-xs text-gray-400 mb-2">${new Date(p.createdAt).toLocaleString()}</div>
                    <div class="text-sm text-gray-600 truncate">${p.fortune.substring(0, 100)}...</div>
                `;
                card.onclick = () => {
                    fortuneDisplay.innerHTML = marked.parse(p.fortune);
                    fortuneDisplay.classList.remove('hidden');
                    resultContent.classList.add('hidden');
                    saveBtn.classList.add('hidden');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                profileList.appendChild(card);
            });
        }

        loadProfiles();

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const apiKey = localStorage.getItem('openrouter_api_key');
            if (!apiKey) {
                alert('OpenRouter API 키를 먼저 입력하고 저장해 주세요.');
                return;
            }

            // 초기화
            currentSajuData = null;
            currentFortune = null;
            placeholderText.classList.add('hidden');
            loader.classList.remove('hidden');
            fortuneDisplay.classList.add('hidden');
            saveBtn.classList.add('hidden');
            submitBtn.disabled = true;
            loadingText.innerText = '사주 데이터를 계산하는 중...';

            const name = document.getElementById('name').value;
            const gender = document.getElementById('gender').value;
            const birthDate = document.getElementById('birthDate').value;
            const birthTime = document.getElementById('birthTime').value;
            const mbti = document.getElementById('mbti').value;
            const isLunar = document.getElementById('isLunar').checked;
            const isLeap = document.getElementById('isLeap').checked;

            try {
                // 1단계: 브라우저에서 사주 계산
                const [year, month, day] = birthDate.split('-').map(Number);
                const [hour, minute] = birthTime.split(':').map(Number);

                const result = ssaju.calculateSaju({
                    year, month, day, hour, minute,
                    isLunar: isLunar,
                    isLeap: isLeap,
                    gender: gender === 'female' ? 'f' : 'm'
                });

                const sajuCompact = result.toCompact();
                currentSajuData = { name, gender, birthDate, birthTime, mbti, sajuCompact };

                loadingText.innerText = 'AI가 2026년 운세를 생성하고 있습니다... (약 10초 소요)';

                // 2단계: 브라우저에서 직접 AI 호출
                const prompt = `
사용자 이름: ${name}
사주 정보 (Compact): ${sajuCompact}
MBTI 유형: ${mbti}
분석 연도: 2026년 (병오년)

위 정보를 바탕으로 전통 사주의 역학적 분석과 MBTI의 성격적 특성을 결합하여 2026년 신개념 운세를 작성해 줘.
다음 카테고리를 포함하여 한국어로 친절하고 상세하게 답해 줘:

1. 2026년 총운 (올해의 핵심 분위기와 키워드)
2. 월별 운세 (1월부터 12월까지 각 달의 핵심 운세 요약)
3. 카테고리별 상세 운세:
   - 연애/결혼, 직장/사업, 재물, 건강

출력 형식은 마크다운(Markdown)을 사용해 줘.
`;

                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'google/gemini-3.1-flash-lite',
                        messages: [{ role: 'user', content: prompt }],
                        max_tokens: 2000,
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message || 'AI 응답 오류');

                currentFortune = data.choices[0].message.content;
                
                // 결과 표시
                fortuneDisplay.innerHTML = marked.parse(currentFortune);
                loader.classList.add('hidden');
                fortuneDisplay.classList.remove('hidden');
                resultContent.classList.add('hidden');
                saveBtn.classList.remove('hidden');

            } catch (err) {
                alert('오류 발생: ' + err.message);
                loader.classList.add('hidden');
                placeholderText.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
            }
        };

        saveBtn.onclick = () => {
            if (!currentSajuData || !currentFortune) return;
            
            const profiles = JSON.parse(localStorage.getItem('fortune_profiles') || '[]');
            profiles.push({
                ...currentSajuData,
                fortune: currentFortune,
                createdAt: new Date().toISOString()
            });
            
            localStorage.setItem('fortune_profiles', JSON.stringify(profiles));
            alert('프로필이 브라우저에 저장되었습니다!');
            loadProfiles();
            saveBtn.classList.add('hidden');
        };
    </script>
</body>
</html>
