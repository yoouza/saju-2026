<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>케이뱅크 스타일 MBTI 사주 2026</title>
    <!-- Kbank-style Typography (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ssaju@latest/dist/index.global.js"></script>
    <style>
        :root {
            --kbank-navy: #0114A7;
            --kbank-blue: #4262FF;
            --kbank-bg: #F7F9FD;
            --kbank-text: #111111;
            --kbank-gray: #666666;
        }
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--kbank-bg);
            color: var(--kbank-text);
            -webkit-font-smoothing: antialiased;
        }
        .kbank-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease;
        }
        .kbank-btn-primary {
            background-color: var(--kbank-navy);
            color: white;
            border-radius: 16px;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        .kbank-btn-primary:hover {
            background-color: #010f8a;
            transform: translateY(-2px);
        }
        .kbank-input {
            background-color: #f1f3f7;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
        }
        .kbank-input:focus {
            outline: 2px solid var(--kbank-blue);
            background-color: #ffffff;
        }
        .loading-dots:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
        /* Fortune Result Styling */
        .fortune-section { margin-bottom: 24px; }
        .fortune-title { font-size: 1.1rem; font-weight: 700; color: var(--kbank-navy); margin-bottom: 8px; display: flex; items-center: center; gap: 8px; }
        .fortune-content { background: #f8faff; padding: 16px; border-radius: 16px; font-size: 0.95rem; line-height: 1.6; color: #333; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-10">
    <div class="max-w-md w-full">
        <!-- Header -->
        <header class="mb-10 text-left w-full px-2">
            <div class="inline-block bg-white px-3 py-1 rounded-full text-xs font-bold text-indigo-600 mb-3 shadow-sm">2026 신년운세</div>
            <h1 class="text-3xl font-extrabold leading-tight">가깝고 편한<br><span class="text-indigo-700">MBTI 사주 분석</span></h1>
            <p class="text-gray-500 mt-2 text-sm font-medium">케이뱅크 스타일로 즐기는 스마트한 운세</p>
        </header>

        <!-- Main Form -->
        <main id="mainContainer" class="space-y-6">
            <section id="inputCard" class="kbank-card p-8">
                <div class="space-y-5">
                    <div>
                        <label class="text-xs font-bold text-gray-400 mb-2 block uppercase tracking-wider">기본 정보</label>
                        <input type="text" id="name" placeholder="이름을 입력해 주세요" class="kbank-input text-lg font-semibold">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <select id="gender" class="kbank-input font-medium">
                                <option value="male">남성</option>
                                <option value="female">여성</option>
                            </select>
                        </div>
                        <div>
                            <select id="mbti" class="kbank-input font-medium">
                                <option value="INTJ">INTJ</option><option value="INTP">INTP</option><option value="ENTJ">ENTJ</option><option value="ENTP">ENTP</option>
                                <option value="INFJ">INFJ</option><option value="INFP">INFP</option><option value="ENFJ">ENFJ</option><option value="ENFP">ENFP</option>
                                <option value="ISTJ">ISTJ</option><option value="ISFJ">ISFJ</option><option value="ESTJ">ESTJ</option><option value="ESFJ">ESFJ</option>
                                <option value="ISTP">ISTP</option><option value="ISFP">ISFP</option><option value="ESTP">ESTP</option><option value="ESFP">ESFP</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="text-xs font-bold text-gray-400 mb-2 block uppercase tracking-wider">생년월일</label>
                        <input type="date" id="birthDate" class="kbank-input font-medium">
                    </div>

                    <div class="flex items-center justify-between px-1">
                        <span class="text-sm font-bold text-gray-600">음력으로 계산하기</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="isLunar" class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                        </label>
                    </div>

                    <button id="analyzeBtn" class="kbank-btn-primary w-full py-4 text-lg mt-4 shadow-lg shadow-indigo-100">분석 시작하기</button>
                </div>
            </section>

            <!-- Loading State -->
            <section id="loadingCard" class="hidden kbank-card p-12 text-center flex flex-col items-center">
                <div class="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mb-6">
                    <div class="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                </div>
                <h2 class="text-xl font-bold mb-2">운세를 분석 중입니다</h2>
                <p class="text-gray-400 text-sm font-medium">당신의 MBTI와 사주를 매칭하고 있어요<span class="loading-dots"></span></p>
            </section>

            <!-- Result Card -->
            <section id="resultCard" class="hidden space-y-4">
                <div class="kbank-card p-8 bg-gradient-to-br from-indigo-700 to-blue-600 text-white relative overflow-hidden">
                    <div class="relative z-10">
                        <p id="resName" class="text-indigo-100 text-sm font-bold mb-1"></p>
                        <h2 class="text-2xl font-black mb-4">2026년 총운 분석</h2>
                        <div id="resSummary" class="text-lg font-medium leading-relaxed opacity-90"></div>
                    </div>
                    <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white opacity-10 rounded-full"></div>
                </div>

                <div class="kbank-card p-6 space-y-6">
                    <div class="fortune-section">
                        <h3 class="fortune-title">❤️ 연애/결혼</h3>
                        <div id="resLove" class="fortune-content"></div>
                    </div>
                    <div class="fortune-section">
                        <h3 class="fortune-title">💼 직장/사업</h3>
                        <div id="resJob" class="fortune-content"></div>
                    </div>
                    <div class="fortune-section">
                        <h3 class="fortune-title">💰 재물운</h3>
                        <div id="resMoney" class="fortune-content"></div>
                    </div>
                    <div class="fortune-section">
                        <h3 class="fortune-title">🌿 건강운</h3>
                        <div id="resHealth" class="fortune-content"></div>
                    </div>
                </div>

                <div class="kbank-card p-6">
                    <h3 class="text-sm font-bold text-gray-400 mb-4 px-1">📅 월별 운세 하이라이트</h3>
                    <div id="resMonthly" class="grid grid-cols-2 gap-3">
                        <!-- Monthly items will be injected here -->
                    </div>
                </div>

                <button onclick="location.reload()" class="w-full py-4 text-gray-500 font-bold hover:text-indigo-600 transition">다시 분석하기</button>
            </section>
        </main>

        <!-- Footer -->
        <footer class="mt-12 text-center pb-10">
            <p class="text-gray-300 text-xs font-bold tracking-widest uppercase">K-STYLE SAJU ANALYSIS</p>
        </footer>
    </div>

    <script>
        const analyzeBtn = document.getElementById('analyzeBtn');
        const inputCard = document.getElementById('inputCard');
        const loadingCard = document.getElementById('loadingCard');
        const resultCard = document.getElementById('resultCard');

        analyzeBtn.onclick = () => {
            const name = document.getElementById('name').value || '이름없음';
            const mbti = document.getElementById('mbti').value;
            const birthDate = document.getElementById('birthDate').value;

            if (!birthDate) {
                alert('생년월일을 선택해 주세요.');
                return;
            }

            inputCard.classList.add('hidden');
            loadingCard.classList.remove('hidden');

            // Simulate deep analysis logic (Deterministic but feels smart)
            setTimeout(() => {
                generateFortune(name, mbti, birthDate);
                loadingCard.classList.add('hidden');
                resultCard.classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 2500);
        };

        function generateFortune(name, mbti, birthDate) {
            const date = new Date(birthDate);
            const seed = date.getDate() + date.getMonth() + mbti.charCodeAt(0);
            
            document.getElementById('resName').innerText = `${name}님의 ${mbti} 사주`;
            
            // Logic based on MBTI and Date to make it feel personalized without an API
            const energy = mbti.startsWith('E') ? '활기찬 에너지' : '차분한 내면의 힘';
            const focus = mbti.endsWith('P') ? '유연한 대처' : '철저한 계획';
            
            document.getElementById('resSummary').innerText = `2026년 병오년은 ${name}님에게 "${energy}"가 가득한 한 해가 될 것입니다. 특히 ${focus}를 통해 예상치 못한 기회를 잡게 됩니다.`;
            
            document.getElementById('resLove').innerText = mbti.includes('F') 
                ? "감정적인 교감이 깊어지는 해입니다. 솔직한 표현이 관계를 더욱 단단하게 만들 거예요."
                : "지적인 대화가 잘 통하는 사람과의 인연이 강합니다. 차분하게 서로를 알아가는 시간이 필요합니다.";

            document.getElementById('resJob').innerText = mbti.includes('N')
                ? "창의적인 아이디어가 빛을 발합니다. 새로운 프로젝트나 이직에서 긍정적인 신호가 보입니다."
                : "성실함이 가장 큰 무기가 됩니다. 꾸준한 성과가 인정을 받아 승진이나 확장의 기회가 옵니다.";

            document.getElementById('resMoney').innerText = "상반기보다는 하반기에 재물운이 상승합니다. 불필요한 지출을 줄이고 장기적인 투자에 관심을 가져보세요.";
            
            document.getElementById('resHealth').innerText = "심혈관계 건강에 유의해야 하는 해입니다. 규칙적인 운동과 충분한 휴식이 행운을 유지하는 비결입니다.";

            const monthlyContainer = document.getElementById('resMonthly');
            monthlyContainer.innerHTML = '';
            const seasonalThemes = ['새로운 시작', '성장의 발판', '안정의 시기', '수확의 계절'];
            
            for (let i = 1; i <= 12; i++) {
                const monthDiv = document.createElement('div');
                monthDiv.className = 'bg-gray-50 p-3 rounded-xl border border-gray-100';
                monthDiv.innerHTML = `
                    <div class="text-[10px] font-black text-gray-300 mb-1">${i}월</div>
                    <div class="text-xs font-bold text-gray-700">${seasonalThemes[Math.floor((i-1)/3)]}</div>
                `;
                monthlyContainer.appendChild(monthDiv);
            }
        }
    </script>
</body>
</html>
